<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WHR Prediction System</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 60px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }

        p {
            color: #777;
            font-size: 14px;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background: #4facfe;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #00c6ff;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f7ff;
            border-radius: 10px;
        }

        .category {
            font-weight: bold;
            font-size: 18px;
        }

        .normal {
            color: green;
        }

        .central {
            color: orange;
        }

        .high {
            color: red;
        }

        img {
            margin-top: 15px;
            border-radius: 10px;
            max-width: 100%;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>WHR Prediction</h1>
    <p>Upload silhouette image to predict obesity risk</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    {% if prediction %}
        <div class="result">
            <p><strong>Predicted WHR:</strong> {{ prediction }}</p>

            <p class="category 
                {% if category == 'Normal' %}normal
                {% elif category == 'Central Obesity' %}central
                {% else %}high{% endif %}">
                {{ category }}
            </p>

            <img src="{{ image }}">
        </div>
    {% endif %}

    <div class="footer">
        Final Year Project | Deep Learning based WHR Prediction
    </div>
</div>

</body>
</html>
